# Grupo 3 Workflow Project Skeleton Initialization

## Action

Follow the project-skeleton-initialization workflow:
1. Add .gitignore and basic config files
2. Add Dockerfile and build scripts
3. Add backend source files (controllers, models, services, repositories, configs, DTOs, exceptions)
4. Add backend test files (unit/integration tests for controllers, services, repositories)
5. Add backend resources (application.properties)
6. Add frontend source files (pages, components, styles, configs)
7. Add infra files (Makefile, docker-compose.yml, terraform configs)
8. Add shell files (Dockerfile, index.html, package.json, src, vite config)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: Grupo-3/Trabalho_Eng_Soft_II/Dockerfile, Grupo-3/Trabalho_Eng_Soft_II/pom.xml, Grupo-3/Trabalho_Eng_Soft_II/src/main/java/com/example/Trabalho_Eng_Soft_II/**

